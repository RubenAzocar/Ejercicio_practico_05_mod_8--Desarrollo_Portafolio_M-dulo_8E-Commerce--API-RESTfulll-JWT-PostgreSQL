<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick13's Garage | Repuestos Vintage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/estilo.css" />
  </head>
  <body>
    <div class="fondo-textura"></div>

    <header class="encabezado-hero">
      <div class="container py-4 py-lg-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <p class="etiqueta-marca mb-1">Tienda de Repuestos Automotrices Vintage</p>
            <h1 class="titulo-principal mb-0">Nick13's Garage</h1>
          </div>
          <div class="d-flex gap-2">
            <a id="botonIrLogin" href="/login.html" class="btn btn-outline-light btn-sm">Registro / Login</a>
            <button id="botonLogout" class="btn btn-vintage btn-sm d-none" type="button">Cerrar sesion</button>
          </div>
        </div>
      </div>
    </header>

    <main class="container pb-5">
      <div id="contenedorMensajes" class="alert d-none mt-3" role="alert"></div>

      <section id="seccionApp" class="d-none mt-4">
        <div class="row g-4">
          <div class="col-xl-8">
            <div class="panel-vintage">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="subtitulo mb-0">Catalogo de Repuestos</h2>
                <button id="botonRecargarProductos" class="btn btn-outline-secondary btn-sm" type="button">Recargar</button>
              </div>
              <div id="listaProductos" class="row g-3"></div>
            </div>
          </div>

          <div class="col-xl-4">
            <div class="panel-vintage mb-4">
              <h2 class="subtitulo">Tu Carrito</h2>
              <div class="table-responsive mt-3">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th>Producto</th>
                      <th>Cant.</th>
                      <th class="text-end">Subtotal</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="tablaCarrito"></tbody>
                </table>
              </div>
              <div class="d-flex justify-content-between fw-bold">
                <span>Total:</span>
                <span id="totalCarrito">$0</span>
              </div>

              <div class="d-grid mt-3">
                <button id="botonIrPagar" class="btn btn-vintage" type="button">Ir a pagar</button>
              </div>
            </div>

            <div class="panel-vintage" id="panelAdministrativo">
              <h2 id="tituloFormularioProducto" class="subtitulo">Nuevo Producto</h2>
              <p class="texto-ayuda mb-2">Completa los datos y sube la imagen para crear o modificar un producto.</p>
              <form id="formUpload" class="d-flex flex-column gap-3">
                <input
                  id="inputNombreProducto"
                  name="name"
                  class="form-control"
                  placeholder="Nombre del producto"
                  maxlength="120"
                  required
                />
                <textarea
                  id="inputDescripcionProducto"
                  name="description"
                  class="form-control"
                  placeholder="Descripcion"
                  rows="3"
                  maxlength="1000"
                  required
                ></textarea>
                <input
                  id="inputPrecioProducto"
                  name="price"
                  type="number"
                  step="0.01"
                  min="1"
                  class="form-control"
                  placeholder="Precio"
                  required
                />
                <input
                  id="inputImagen"
                  type="file"
                  class="input-archivo-oculto"
                  name="imagen"
                  accept=".jpg,.jpeg,.png,.webp"
                />
                <div class="d-flex flex-column gap-2">
                  <button id="botonElegirImagen" class="btn btn-outline-secondary" type="button">Elegir imagen del producto</button>
                  <small id="nombreArchivoSeleccionado" class="texto-ayuda">Ninguna imagen seleccionada para el nuevo producto.</small>
                </div>
                <div class="d-flex gap-2">
                  <button id="botonGuardarProducto" class="btn btn-vintage flex-grow-1" type="submit">Crear producto</button>
                  <button id="botonCancelarEdicion" class="btn btn-outline-secondary d-none" type="button">Cancelar</button>
                </div>
              </form>
              <p class="texto-ayuda mt-3 mb-0" id="respuestaUpload"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/cliente.js" defer></script>
  </body>
</html>
