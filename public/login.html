<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick13's Garage | Registro e Ingreso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/estilo.css" />
  </head>
  <body>
    <div class="fondo-textura"></div>

    <header class="encabezado-hero">
      <div class="container py-4 py-lg-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <p class="etiqueta-marca mb-1">Tienda de Repuestos Automotrices Vintage</p>
            <h1 class="titulo-principal mb-0">Nick13's Garage</h1>
          </div>
          <a href="/" class="btn btn-outline-light btn-sm">Volver a la Tienda</a>
        </div>
      </div>
    </header>

    <main class="container pb-5">
      <div id="contenedorMensajes" class="alert d-none mt-3" role="alert"></div>

      <section id="seccionAuth" class="mt-4">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="panel-vintage h-100">
              <h2 class="subtitulo">Registro</h2>
              <form id="formRegistro" class="mt-3" autocomplete="off">
                <div class="mb-3">
                  <label class="form-label" for="registroUsername">Username</label>
                  <input id="registroUsername" name="username" class="form-control" maxlength="50" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="registroEmail">Email</label>
                  <input id="registroEmail" name="email" type="email" class="form-control" maxlength="150" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="registroPassword">Password</label>
                  <input id="registroPassword" name="password" type="password" class="form-control" minlength="6" required />
                </div>
                <button class="btn btn-vintage w-100" type="submit">Crear cuenta</button>
              </form>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="panel-vintage h-100">
              <h2 class="subtitulo">Login</h2>
              <form id="formLogin" class="mt-3" autocomplete="off">
                <div class="mb-3">
                  <label class="form-label" for="loginIdentificador">Username o Email</label>
                  <input id="loginIdentificador" name="identificador" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="loginPassword">Password</label>
                  <input id="loginPassword" name="password" type="password" class="form-control" required />
                </div>
                <button class="btn btn-vintage w-100" type="submit">Ingresar</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/cliente.js" defer></script>
  </body>
</html>
