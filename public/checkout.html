<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick13's Garage | Finalizar Compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/estilo.css" />
  </head>
  <body>
    <div class="fondo-textura"></div>

    <header class="encabezado-hero">
      <div class="container py-4 py-lg-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
          <div>
            <p class="etiqueta-marca mb-1">Tienda de Repuestos Automotrices Vintage</p>
            <h1 class="titulo-principal mb-0">Nick13's Garage</h1>
          </div>
          <a href="/" class="btn btn-outline-light btn-sm">Volver al Catalogo</a>
        </div>
      </div>
    </header>

    <main class="container pb-5">
      <div id="contenedorMensajes" class="alert d-none mt-3" role="alert"></div>

      <section id="seccionCheckout" class="mt-4">
        <div class="row g-4 justify-content-center">
          <div class="col-lg-8">
            <div class="panel-vintage mb-4">
              <h2 class="subtitulo">Resumen de tu pedido</h2>
              <div class="table-responsive mt-3">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Imagen</th>
                      <th>Producto</th>
                      <th>Descripcion</th>
                      <th>Cantidad</th>
                      <th class="text-end">Precio Unit.</th>
                      <th class="text-end">Subtotal</th>
                    </tr>
                  </thead>
                  <tbody id="tablaCarrito">
                    <!-- Dinamico -->
                  </tbody>
                  <tfoot>
                    <tr class="fs-5 fw-bold border-top-2">
                        <td colspan="5" class="text-end">Total a pagar:</td>
                        <td class="text-end text-primary" id="totalCarrito">$0</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>

            <div class="panel-vintage" id="panelPagoCompleto">
                <h2 class="subtitulo">Metodo de Pago</h2>
                <p class="texto-ayuda mb-4">Ingresa los datos de tu tarjeta para completar la simulacion de compra.</p>
                
                <form id="formPagoTarjeta" class="row g-3" autocomplete="off">
                  <div class="col-md-7">
                      <label class="form-label">Nombre del Titular</label>
                      <input
                        id="inputTitularTarjeta"
                        name="cardHolder"
                        class="form-control"
                        placeholder="EJ: JUAN PEREZ"
                        maxlength="120"
                        required
                      />
                  </div>
                  <div class="col-md-5">
                      <label class="form-label">Numero de Tarjeta</label>
                      <input
                        id="inputNumeroTarjeta"
                        name="cardNumber"
                        class="form-control"
                        inputmode="numeric"
                        placeholder="4500 0000 0000 0001"
                        minlength="13"
                        maxlength="19"
                        required
                      />
                  </div>
                  <div class="col-6 col-md-3">
                      <label class="form-label">Mes Exp.</label>
                      <input
                        id="inputMesExpiracion"
                        name="expiryMonth"
                        type="number"
                        min="1"
                        max="12"
                        class="form-control"
                        placeholder="MM (01-12)"
                        required
                      />
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label">Año Exp.</label>
                    <input
                      id="inputAnioExpiracion"
                      name="expiryYear"
                      type="number"
                      min="2024"
                      max="2099"
                      class="form-control"
                      placeholder="AAAA (2025)"
                      required
                    />
                  </div>
                  <div class="col-12 col-md-3">
                    <label class="form-label">CVV</label>
                    <input
                      id="inputCvv"
                      name="cvv"
                      class="form-control"
                      inputmode="numeric"
                      minlength="3"
                      maxlength="4"
                      placeholder="123"
                      required
                    />
                  </div>
                  
                  <div class="col-12 mt-4 d-grid">
                      <button class="btn btn-success btn-lg" type="submit">Confirmar y Pagar</button>
                  </div>
                </form>
                <p class="texto-ayuda mt-3 text-center" id="respuestaPagoTarjeta"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/checkout.js" defer></script>
  </body>
</html>
